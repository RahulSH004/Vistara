
services:
  db:
    image: postgres:16
    restart: always
    shm_size: 128mb
    volumes:
      - type: volume
        source: hotel_booking_platform_data
        target: /var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: hotel_book123
      POSTGRES_USER: hotel_booking_platform
      POSTGRES_DB: hotel_booking_platform
    ports:
      - "5432:5432"
  adminer:
  image: adminer
  restart: always
  ports:
    - "8080:8080"
    
volumes:
  hotel_booking_platform_data:

